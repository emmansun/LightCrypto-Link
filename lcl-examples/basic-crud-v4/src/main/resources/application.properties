# === Spring Boot 4.x specific ===
# Exclude the SB3 adapter auto-configuration (pulled in transitively by lcl-adapter-mongodb-v4).
# The v4 adapter provides its own MongoAdapterV4AutoConfiguration.
spring.autoconfigure.exclude=io.github.emmansun.lightcrypto.adapter.mongodb.MongoAdapterAutoConfiguration
spring.main.allow-bean-definition-overriding=true

# MongoDB connection — inject via env: MONGODB_URI
# e.g. set MONGODB_URI=mongodb://user:pass@host:27017/db?authSource=admin
spring.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/lcl-demo-v4}

# === LightCrypto-Link configuration ===
lightcrypto.kms.providers[0].id=local
lightcrypto.kms.providers[0].type=LOCAL_SYMMETRIC
# CMK: 64 hex chars = 32-byte symmetric master key — inject via env: LCL_CMK_HEX
lightcrypto.kms.providers[0].key-hex=${LCL_CMK_HEX:a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2}
