# LightCrypto-Link configuration — Alibaba Cloud KMS
#
# The Alibaba KMS provider module uses its own configuration prefix (lcl.crypto.alibaba).
# It auto-activates when lcl.crypto.alibaba.key-id is set.
lightcrypto:
  cryptography:
    default-algorithm: SM4_GCM

lcl:
  crypto:
    alibaba:
      region-id: cn-shenzhen
      endpoint: ${ALIBABA_KMS_ENDPOINT:kms.cn-shenzhen.aliyuncs.com}
      key-id: ${ALIBABA_KMS_KEY_ID}
      access-key-id: ${ALIBABA_AK_ID}
      access-key-secret: ${ALIBABA_AK_SECRET}
      # mode: SYMMETRIC | ASYMMETRIC, default is ASYMMETRIC
      # key-version-id: optional
      # public-key: optional PEM

# Embedded MongoDB (for local demo; remove if using external MongoDB)
de:
  flapdoodle:
    mongodb:
      embedded:
        version: 6.0.12

spring:
  main:
    allow-bean-definition-overriding: true
  data:
    mongodb:
      database: lcl-alibaba-kms-demo
