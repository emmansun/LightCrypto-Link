name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build & Test
        run: mvn -B clean verify

      - name: Set release version
        run: |
          TAG=${GITHUB_REF_NAME#v}
          mvn -B versions:set -DnewVersion=$TAG -DgenerateBackupPoms=false

      - name: Deploy to GitHub Packages
        run: mvn -B clean deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          generate_release_notes: true
          files: |
            lightcrypto-link-spi/target/*.jar
            lightcrypto-link-spring-boot-starter/target/*.jar
            lightcrypto-link-spring-boot-starter-jdk/target/*.jar
            lightcrypto-link-azure-kms/target/*.jar
            lightcrypto-link-alibaba-kms/target/*.jar

  deploy-central:
    runs-on: ubuntu-latest
    needs: release

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up JDK 17 with GPG and Central credentials
        uses: actions/setup-java@1bcf9fb12cf4aa7d266a90ae39939e61372fe520 # v5.4.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_SIGNING_KEY }}
          gpg-passphrase: GPG_SIGNING_KEY_PASSWORD

      - name: Set release version
        run: |
          TAG=${GITHUB_REF_NAME#v}
          mvn -B versions:set -DnewVersion=$TAG -DgenerateBackupPoms=false

      - name: Install parent POM locally
        run: mvn -B -N install -DskipTests

      - name: Deploy to Maven Central
        run: mvn -B clean deploy -DskipTests -Pcentral -pl .,lightcrypto-link-spi,lightcrypto-link-spring-boot-starter,lightcrypto-link-spring-boot-starter-jdk,lightcrypto-link-azure-kms,lightcrypto-link-alibaba-kms
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          GPG_SIGNING_KEY_PASSWORD: ${{ secrets.GPG_SIGNING_KEY_PASSWORD }}
