name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build & Test
        run: mvn -B clean verify

      - name: Set release version
        run: |
          TAG=${GITHUB_REF_NAME#v}
          mvn -B versions:set -DnewVersion=$TAG -DgenerateBackupPoms=false

      - name: Deploy to GitHub Packages
        run: mvn -B clean deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@3d0d9888cb7fd7b750713d6e236d1fcb99157228 # v3.0.2
        with:
          generate_release_notes: true
          files: |
            lcl-spi/target/*.jar
            lcl-core/target/*.jar
            lcl-spring-boot-starter/target/*.jar
            lcl-adapter-mongodb-core/target/*.jar
            lcl-adapter-mongodb/target/*.jar
            lcl-adapter-mongodb-v4/target/*.jar
            lcl-provider-azure-kms/target/*.jar
            lcl-provider-alibaba-kms/target/*.jar

  deploy-central:
    runs-on: ubuntu-latest
    needs: release

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up JDK 17 with GPG and Central credentials
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: central
          server-username: CENTRAL_TOKEN_USERNAME
          server-password: CENTRAL_TOKEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_SIGNING_KEY }}
          gpg-passphrase: GPG_SIGNING_KEY_PASSWORD

      - name: Set release version
        run: |
          TAG=${GITHUB_REF_NAME#v}
          mvn -B versions:set -DnewVersion=$TAG -DgenerateBackupPoms=false

      - name: Install parent POM locally
        run: mvn -B -N install -DskipTests

      - name: Deploy to Maven Central
        run: mvn -B clean deploy -DskipTests -Pcentral -pl .,lcl-spi,lcl-core,lcl-spring-boot-starter,lcl-adapter-mongodb-core,lcl-adapter-mongodb,lcl-adapter-mongodb-v4,lcl-provider-azure-kms,lcl-provider-alibaba-kms
        env:
          CENTRAL_TOKEN_USERNAME: ${{ secrets.CENTRAL_TOKEN_USERNAME }}
          CENTRAL_TOKEN_PASSWORD: ${{ secrets.CENTRAL_TOKEN_PASSWORD }}
          GPG_SIGNING_KEY_PASSWORD: ${{ secrets.GPG_SIGNING_KEY_PASSWORD }}
