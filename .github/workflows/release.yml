name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Build & Test
        run: mvn -B clean verify

      - name: Set release version
        run: |
          TAG=${GITHUB_REF_NAME#v}
          mvn -B versions:set -DnewVersion=$TAG -DgenerateBackupPoms=false

      - name: Deploy to GitHub Packages
        run: mvn -B deploy -DskipTests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            lightcrypto-link-spring-boot-starter/target/*.jar
            lightcrypto-link-azure-kms/target/*.jar
            lightcrypto-link-alibaba-kms/target/*.jar
