name: Performance Benchmark

on:
  schedule:
    # Nightly at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      threshold:
        description: 'Regression threshold percentage'
        required: false
        default: '10'

permissions:
  contents: read

jobs:
  benchmark:
    name: Run JMH Benchmarks
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: '3.11'

      - name: Record hardware info
        run: |
          echo "## Hardware" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          lscpu | grep -E "Model name|CPU\(s\)|MHz|cache" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          lscpu | grep -E "Model name|CPU\(s\)|MHz|cache"

      - name: Build benchmark JAR
        run: mvn package -Pbench -pl lcl-benchmarks -am -DskipTests -q

      - name: Run benchmarks
        working-directory: lcl-benchmarks
        run: |
          mkdir -p results
          java -jar target/benchmarks.jar -rf json -rff results/benchmark-results.json

      - name: Compare against baseline
        id: compare
        run: |
          THRESHOLD="${{ github.event.inputs.threshold || '10' }}"
          python scripts/compare-baseline.py \
            lcl-benchmarks/results/benchmark-results.json \
            lcl-benchmarks/baseline.json \
            --threshold "$THRESHOLD"

      - name: Upload results artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: benchmark-results
          path: lcl-benchmarks/results/benchmark-results.json
          retention-days: 30

      - name: Summary
        if: always()
        run: |
          echo "## Benchmark Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f lcl-benchmarks/results/benchmark-results.json ]; then
            echo "Results uploaded as artifact: **benchmark-results**" >> $GITHUB_STEP_SUMMARY
          fi
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Threshold: ${{ github.event.inputs.threshold || '10' }}%" >> $GITHUB_STEP_SUMMARY
