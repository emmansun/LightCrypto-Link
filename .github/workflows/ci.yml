name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6.0
        ports:
          - 27017:27017

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@bf7454d06d71f1098171f2acdf0cd4708d7b5920 # v2.20.0
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Set up JDK 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build & Test
        run: mvn -B clean verify

      - name: Install Core Artifacts for Module-Scoped Checks
        run: mvn -B -pl lcl-spi,lcl-core -am -DskipTests install

      - name: Checkstyle
        run: mvn -B -pl lcl-spring-boot-starter checkstyle:check

      - name: SpotBugs
        run: mvn -B -pl lcl-spring-boot-starter com.github.spotbugs:spotbugs-maven-plugin:4.10.3.0:check

      - name: Upload JaCoCo Report
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: jacoco-module-reports
          path: |
            **/target/site/jacoco/
          retention-days: 14

      - name: Upload Coverage to Codecov
        if: always() && env.CODECOV_TOKEN != ''
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
        with:
          token: ${{ env.CODECOV_TOKEN }}
          files: '**/target/site/jacoco/jacoco.xml'
          disable_search: true
          fail_ci_if_error: false
