# Testcontainers MongoDB is auto-configured via @ServiceConnection when Docker is available.
# When Docker is not available (e.g. CI with service container), fall back to localhost.
spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/test}

# Allow LCL's custom MappingMongoConverter to override the default
spring.main.allow-bean-definition-overriding=true

# Exclude SB3 adapter's auto-config — both adapters share the same package,
# so we must disable the SB3 version to ensure only the v4 variant is active.
spring.autoconfigure.exclude=io.github.emmansun.lightcrypto.adapter.mongodb.MongoAdapterAutoConfiguration

# LightCrypto-Link configuration
lightcrypto.kms.providers[0].id=local
lightcrypto.kms.providers[0].type=LOCAL_SYMMETRIC
lightcrypto.kms.providers[0].key-hex=a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
lightcrypto.adapters.mongodb.auto-init=true
