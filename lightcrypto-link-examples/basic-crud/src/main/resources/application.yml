# LightCrypto-Link configuration
lcl:
  crypto:
    # CMK: 64 hex chars = 32-byte symmetric master key.
    # In production, inject via env var / K8s Secret / Config Service.
    cmk: a1b2c3d4e5f6a7b8c9d0e1f2a3b4c5d6e7f8a9b0c1d2e3f4a5b6c7d8e9f0a1b2
    enabled: true

# Embedded MongoDB (for local demo; remove if using external MongoDB)
de:
  flapdoodle:
    mongodb:
      embedded:
        version: 6.0.12

spring:
  data:
    mongodb:
      database: lcl-demo
